{#
  Inline SVG icon set (Lucide-style, stroke = currentColor) used across the app.
  Usage:  {% from "icons.html" import icon %}  then  {{ icon("plus") }}
  Lightweight and CDN-free so it works offline in the PWA and adapts to the theme.
#}
{%- macro icon(name, size=16, cls="") -%}
<svg class="app-icon {{ cls }}" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
{%- if name == "home" -%}<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>
{%- elif name == "folder" -%}<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
{%- elif name == "clock" -%}<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
{%- elif name == "plus" -%}<path d="M12 5v14M5 12h14"/>
{%- elif name == "archive" -%}<rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/>
{%- elif name == "search" -%}<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
{%- elif name == "reset" -%}<path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/>
{%- elif name == "restore" -%}<path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/><path d="M12 8v4l3 2"/>
{%- elif name == "inbox" -%}<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
{%- elif name == "check" -%}<path d="M20 6 9 17l-5-5"/>
{%- elif name == "x" -%}<path d="M18 6 6 18M6 6l12 12"/>
{%- elif name == "pencil" -%}<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
{%- elif name == "dashboard" -%}<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
{%- elif name == "calendar" -%}<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
{%- elif name == "sparkles" -%}<path d="M12 3v4M12 17v4M3 12h4M17 12h4"/><path d="M6.3 6.3 9 9M15 15l2.7 2.7M17.7 6.3 15 9M9 15l-2.7 2.7"/>
{%- elif name == "contrast" -%}<circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/>
{%- elif name == "columns" -%}<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16"/>
{%- elif name == "link" -%}<path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/>
{%- elif name == "star" -%}<path d="m12 2 3 6.5 7 .8-5.2 4.8 1.4 7L12 17.8 5.8 21l1.4-7L2 9.3l7-.8z"/>
{%- elif name == "download" -%}<path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
{%- endif -%}
</svg>
{%- endmacro -%}
