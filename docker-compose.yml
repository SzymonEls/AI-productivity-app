services:
  web:
    build:
      context: https://github.com/SzymonEls/AI-productivity-app.git#main
      args:
        APP_UID: "${APP_UID:-1000}"
        APP_GID: "${APP_GID:-1000}"
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    environment:
      FLASK_ENV: production
      SKIP_DB_BOOTSTRAP: "1"
      DATABASE_URL: sqlite:////app/instance/app.db
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ./app/instance
        target: /app/instance
        bind:
          create_host_path: false
    networks:
      - reverse_proxy

networks:
  reverse_proxy:
    driver: bridge
    external: true
